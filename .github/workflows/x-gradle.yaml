name: x-gradle

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version-file: '.tool-versions'

      - name: 🏗️ Set up Node.js
        uses: ./.github/actions/set-up-node-js

      - name: 🏗️ Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🚚 Install Node modules
        uses: ./.github/actions/install-node-modules

      - run: yarn run expo prebuild --platform android

      - working-directory: android
        id: ndk
        run: |
          ./gradlew --console=plain --quiet :properties --property ndkVersion 2>&1 |
          sed -En -e 's/\x1B\[[0-9;]*[mK]//g' -e 's/.*ndk[^0-9]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/Ip' |
          jq --compact-output --raw-input --slurp 'split("\n")[:-1] | map({(.):1}) | add | keys_unsorted'
