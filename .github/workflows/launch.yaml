name: launch

on:
  push:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Set up Node.js
        uses: ./.github/actions/set-up-node-js

      - name: 🏗️ Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🚚 Install dependencies
        run: yarn install

      - name: 🌐 Compile message catalogs
        run: |
          yarn run build:intl:extract-template
          yarn run build:intl:compile

      - name: 👷 Build app
        run: |
          yarn run expo prebuild --platform ios
          yarn run build:ios:test:release

      - name: 💾 Save app build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ./ios/build/Build/Products/Test-Release-iphonesimulator/Hibi.app
          if-no-files-found: 'error'

  test-ios:
    needs: [build-ios]
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.tool-versions'

      - name: 🏗️ Set up Node.js
        uses: ./.github/actions/set-up-node-js

      - name: 🏗️ Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🏗️ Set up Maestro
        uses: ./.github/actions/set-up-maestro

      - name: 📥 Get app build
        uses: actions/download-artifact@v4
        with:
          name: ios-app
          path: Hibi.app

      - name: 🚚 Install dependencies
        run: yarn install

      - name: Launch iOS simulator
        id: launch-ios-simulator
        uses: ./.github/actions/launch-ios-simulator
        with:
          model: 'iPhone 16'
          os: 'iOS'
          os-version: 18.2

      - name: 📲 Install app
        run: xcrun simctl install booted $GITHUB_WORKSPACE/Hibi.app

      - name: 🧪 Run tests
        run: |
          export MAESTRO_DRIVER_STARTUP_TIMEOUT=120000
          yarn run test:end-to-end library

      - name: 💾 Save Maestro artifacts
        if: cancelled() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: ~/.maestro/tests
          retention-days: 2
          include-hidden-files: true
          if-no-files-found: 'error'
